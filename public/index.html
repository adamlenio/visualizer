<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Casambi Lighting Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1c1c1e;
  --bg2:#2c2c2e;
  --bg3:#3a3a3c;
  --bg4:#48484a;
  --orange:#E86524;
  --text:#ffffff;
  --text2:rgba(235,235,245,0.8);
  --text3:rgba(235,235,245,0.55);
  --sep:rgba(255,255,255,0.1);
  --panel:#f2f2f7;
  --panel2:#e5e5ea;
  --panel3:#c7c7cc;
  --pt:#1c1c1e;
  --pt2:#6c6c70;
  --tile:64px;
  --chrome:#0f0f11;
}
html,body{
  height:100%;width:100%;
  background:var(--chrome);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  overflow:hidden;
}

/* ── OUTER SHELL ── 16:9 viewport */
.shell{
  width:100vw;height:100vh;
  display:flex;align-items:stretch;
}

/* ── LEFT: phone column ── ~1/3 */
.phone-col{
  width:33.333%;
  min-width:320px;
  background:var(--chrome);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px 12px;
  border-right:1px solid #1a1a1e;
  flex-shrink:0;
  position:relative;
}

/* Casambi wordmark above phone */
.wordmark{
  margin-bottom:12px;
  display:flex;align-items:center;gap:0;
  opacity:.9;
}

/* ── PHONE FRAME ── scales to fit column height */
.phone{
  width:100%;
  max-width:320px;
  /* height is driven by aspect ratio */
  aspect-ratio:390/844;
  background:var(--bg);
  border-radius:36px;
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 0 0 1px #2a2a2a, 0 20px 60px rgba(0,0,0,.9);
  position:relative;
  flex-shrink:0;
}

/* STATUS */
.sbar{
  height:44px;padding:12px 20px 0;
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.stime{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.sicons{display:flex;align-items:center;gap:5px}
.sicons svg{fill:var(--text)}

/* HEADER */
.hdr{
  padding:2px 16px 8px;
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.hlink{font-size:15px;color:var(--orange);cursor:pointer}
.htitle{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.2px}

/* PANES */
.pane{flex:1;overflow-y:auto;display:none;flex-direction:column}
.pane.active{display:flex}
.pane::-webkit-scrollbar{width:2px}
.pane::-webkit-scrollbar-thumb{background:var(--bg3)}

/* TABS */
.tabbar{
  display:flex;border-top:0.5px solid var(--sep);
  padding-bottom:12px;flex-shrink:0;
  background:rgba(28,28,30,0.96);
}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 0 1px;cursor:pointer;gap:2px}
.tb svg{width:20px;height:20px;fill:var(--text3);transition:fill .15s}
.tb span{font-size:9px;color:var(--text3);transition:color .15s}
.tb.on svg{fill:var(--orange)}
.tb.on span{color:var(--orange)}

/* LUMINAIRES */
.lpad{padding:0 12px 12px}
.nbadge{background:var(--bg2);border-radius:10px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.nbname{font-size:12px;font-weight:600;color:var(--orange)}
.nbstat{font-size:11px;color:var(--text3)}
.btnrow{display:flex;gap:12px;justify-content:center;padding:6px 0 12px;border-bottom:0.5px solid var(--sep);margin-bottom:10px}
.ibtn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.ibcirc{width:54px;height:54px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;transition:background .2s}
.ibcirc svg{width:24px;height:24px;fill:var(--text2);transition:fill .2s}
.ibcirc.active{background:var(--orange)}
.ibcirc.active svg{fill:#fff}
.iblbl{font-size:10px;color:var(--text2);text-align:center}
.seclbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px}
.lumgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;row-gap:10px}
.ltile{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:1px}
.lcirc{width:var(--tile);height:var(--tile);border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;transition:background .3s}
.lcirc svg{width:28px;height:28px;fill:var(--text3);transition:fill .3s}
.lcirc.on{background:var(--bg3)}
.lcirc.on svg{fill:var(--text)}
.larc{width:var(--tile);height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;margin-top:1px}
.larcf{height:100%;border-radius:1px;transition:width .5s ease,background .5s}
.lname{font-size:9px;color:var(--text3);text-align:center;line-height:1.2;max-width:64px}
.lname.on{color:var(--text2)}

/* SCENES (app) */
.scenespad{padding:8px 12px 12px}
.scgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 6px;padding-top:2px}
.stile{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.scirc{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;transition:transform .1s}
.scirc:active{transform:scale(.93)}
.scirc svg{width:26px;height:26px;fill:#fff}
.scirc.on::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--sc,var(--orange));pointer-events:none}
.scname{font-size:10px;color:var(--text2);text-align:center;font-weight:500}

/* MORE */
.morelist{padding:10px 12px}
.mitem{background:var(--bg2);border-radius:10px;padding:11px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.mleft{display:flex;align-items:center;gap:10px}
.micn{width:28px;height:28px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.micn svg{width:14px;height:14px;fill:var(--orange)}
.mlbl{font-size:13px;color:var(--text)}
.mchev{color:var(--text3);font-size:18px;font-weight:300}

/* CONTROL PANEL */
.cpanel{position:absolute;bottom:0;left:0;right:0;background:var(--panel);border-radius:18px 18px 0 0;z-index:20;transform:translateY(105%);transition:transform .32s cubic-bezier(.32,0,.2,1);padding:0 16px 36px}
.cpanel.open{transform:translateY(0)}
.cphandle{width:32px;height:4px;border-radius:2px;background:var(--panel3);margin:8px auto 12px}
.cptop{text-align:center;margin-bottom:10px}
.cptitle{font-size:15px;font-weight:600;color:var(--pt)}
.cpsub{font-size:12px;color:var(--pt2);margin-top:1px}
.cppreview{width:72px;height:72px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;background:#d0d0d0;transition:background .4s}
.cppreview svg{width:36px;height:36px;fill:#888;transition:opacity .4s}
.crow{margin-bottom:11px}
.crhead{display:flex;justify-content:space-between;margin-bottom:4px}
.crlbl{font-size:12px;color:var(--pt)}
.crval{font-size:12px;color:var(--pt2)}
.crslider{width:100%;height:5px;border-radius:2.5px;-webkit-appearance:none;outline:none;cursor:pointer}
.crslider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.2),0 0 0 1px rgba(0,0,0,.07)}
#sl-dim{background:linear-gradient(to right,#111,#fff)}
#sl-cct{background:linear-gradient(to right,#ff9b3c,#fffaf0,#b8d4ff)}
#sl-hue{background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}
#sl-sat{background:linear-gradient(to right,#ddd,#E86524)}
.cpclose{position:absolute;top:14px;right:16px;width:26px;height:26px;border-radius:50%;background:var(--panel2);border:none;font-size:13px;color:var(--pt2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.cas-a{position:absolute;bottom:68px;left:14px;width:24px;height:24px;border-radius:50%;border:1px solid var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer}
.cas-q{position:absolute;bottom:68px;right:14px;width:24px;height:24px;border-radius:50%;border:1px solid var(--text3);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);cursor:pointer}

/* TOAST */
.toast{position:absolute;top:52px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.92);color:#fff;font-size:11px;font-weight:500;padding:5px 13px;border-radius:16px;z-index:30;opacity:0;transition:opacity .22s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

/* ── RIGHT: image column ── ~2/3 */
.image-col{
  flex:1;
  background:#0a0a0c;
  display:flex;flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* Top bar in image column */
.img-topbar{
  height:44px;
  background:#0f0f12;
  border-bottom:1px solid #1a1a1e;
  display:flex;align-items:center;
  padding:0 20px;gap:16px;
  flex-shrink:0;
}
.img-topbar .scene-label{
  font-size:12px;color:rgba(255,255,255,.4);
  letter-spacing:.3px;
}
.img-topbar .scene-name{
  font-size:13px;font-weight:500;color:rgba(255,255,255,.85);
}
.viewpoint-btns{
  margin-left:auto;display:flex;gap:6px;
}
.vpbtn{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:6px;padding:4px 10px;
  font-size:11px;color:rgba(255,255,255,.5);
  cursor:pointer;font-family:inherit;
  transition:background .15s,color .15s,border-color .15s;
}
.vpbtn.active{
  background:rgba(232,101,36,.15);
  border-color:rgba(232,101,36,.4);
  color:var(--orange);
}

/* Photo container — fills remaining height */
.photo-stage{
  flex:1;
  position:relative;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.pbase,.pon-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
}
.pon-img{opacity:0;transition:opacity .7s ease}
.osvg{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;
}

/* Bottom info strip */
.img-bottombar{
  height:40px;background:#0f0f12;
  border-top:1px solid #1a1a1e;
  display:flex;align-items:center;padding:0 20px;gap:20px;
  flex-shrink:0;
}
.zone-pill{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:rgba(255,255,255,.45);
}
.zone-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .4s,opacity .4s}
.zone-dot.off{opacity:.25}

/* ── CONNECTION STATUS BANNER ── */
.status-banner{
  position:fixed;top:0;left:0;right:0;
  padding:6px 14px;font-size:11px;font-weight:600;
  letter-spacing:.4px;text-transform:uppercase;
  color:#fff;text-align:center;z-index:1000;
  transform:translateY(-100%);transition:transform .3s ease;
  pointer-events:none;
}
.status-banner.show{transform:translateY(0)}
.status-banner.connecting{background:#8a5a1e}
.status-banner.connected{background:#1b6a2f}
.status-banner.demo{background:#3a3a3c;color:rgba(235,235,245,.75)}
.status-banner.error{background:#8a1e1e}
.status-banner .dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#fff;margin-right:6px;vertical-align:middle;
  animation:pulse 1.4s ease-in-out infinite;
}
.status-banner.connected .dot{animation:none}
.status-banner.demo .dot{background:rgba(235,235,245,.5);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

</style>
</head>
<body>
<div class="status-banner" id="status-banner"><span class="dot"></span><span id="status-text">Connecting…</span></div>

<div class="shell">

  <!-- ══ LEFT: PHONE ══ -->
  <div class="phone-col">

    <!-- Wordmark above phone -->
    <div class="wordmark">
      <svg height="18" viewBox="0 0 260 44" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#F0CC3A"/>
            <stop offset="100%" stop-color="#E86524"/>
          </linearGradient>
        </defs>
        <!-- C -->
        <path d="M21 4C12 4 5 11 5 22s7 18 16 18c5 0 9-2 12-6l-5-4c-2 2-4 4-7 4-6 0-9-5-9-12s3-12 9-12c3 0 5 1 7 4l5-4C30 7 26 4 21 4z" fill="white"/>
        <!-- A triangle -->
        <polygon points="93,40 108,4 123,40" fill="url(#wg)"/>
        <polygon points="108,15 102,32 114,32" fill="#0f0f11"/>
        <!-- S -->
        <path d="M143 4c-7 0-12 4-12 11 0 5 3 8 9 9l3 1c3 1 5 2 5 5s-2 4-6 4c-3 0-6-2-8-4l-5 5c3 4 8 6 13 6 8 0 13-4 13-11 0-5-3-8-10-10l-3-1c-3-1-4-2-4-4s2-3 5-3c3 0 5 1 7 3l5-4C148 7 146 4 143 4z" fill="white"/>
        <!-- M -->
        <path d="M167 5l-9 17-9-17h-7v34h7V21l8 15h2l8-15v18h7V5z" fill="white"/>
        <!-- B -->
        <path d="M195 5h-10v34h11c8 0 12-3 12-10 0-4-2-7-6-8 2-2 4-4 4-7 0-5-4-9-11-9zm-2 7h2c3 0 5 1 5 4s-2 4-5 4h-2V12zm0 20V26h3c4 0 6 1 6 3s-2 3-6 3h-3z" fill="white"/>
        <!-- I -->
        <rect x="217" y="5" width="8" height="34" fill="white"/>
      </svg>
    </div>

    <div class="phone">
      <!-- STATUS -->
      <div class="sbar">
        <span class="stime">9:41</span>
        <div class="sicons">
          <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="3.5" width="2.5" height="7.5" rx=".8"/><rect x="4" y="2" width="2.5" height="9" rx=".8"/><rect x="8" y="0" width="2.5" height="11" rx=".8"/><rect x="12" y="0" width="2.5" height="11" rx=".8" opacity=".3"/></svg>
          <svg width="15" height="11" viewBox="0 0 16 12"><path d="M8 1.5C11 1.5 13.7 2.9 15.4 5L16.6 3.6C14.5 1.4 11.4 0 8 0S1.5 1.4-.6 3.6L.6 5C2.3 2.9 5 1.5 8 1.5z"/><path d="M8 5c1.9 0 3.6.8 4.8 2.1L14 5.7C12.4 4 10.3 3 8 3S3.6 4 2 5.7L3.2 7.1C4.4 5.8 6.1 5 8 5z"/><circle cx="8" cy="10.5" r="1.5"/></svg>
          <svg width="24" height="11" viewBox="0 0 26 12"><rect x=".5" y=".5" width="21" height="11" rx="3" stroke="white" stroke-width="1" fill="none"/><rect x="22.5" y="3" width="2.5" height="6" rx="1.25" fill="white" opacity=".4"/><rect x="2" y="2" width="16" height="8" rx="2" fill="white"/></svg>
        </div>
      </div>

      <!-- HEADER -->
      <div class="hdr">
        <span class="hlink">Group</span>
        <span class="htitle" id="htitle">ETS Office</span>
        <span class="hlink">Edit</span>
      </div>

      <div class="toast" id="toast"></div>
      <div class="cas-a"><svg height="12" viewBox="0 0 14 16"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0CC3A"/><stop offset="100%" stop-color="#E86524"/></linearGradient></defs><polygon points="7,1 13,15 1,15" fill="url(#ag)"/><polygon points="7,6 4.5,12 9.5,12" fill="#1c1c1e"/></svg></div>
      <div class="cas-q">?</div>

      <!-- LUMINAIRES -->
      <div class="pane active" id="pane-luminaires">
        <div class="lpad">
          <div class="nbadge"><span class="nbname">ETS Office</span><span class="nbstat" id="nbstat">0 of 7 on</span></div>
          <div class="btnrow">
            <div class="ibtn" onclick="toggleAll()">
              <div class="ibcirc" id="allbtn"><svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg></div>
              <span class="iblbl">All luminaires</span>
            </div>
            <div class="ibtn">
              <div class="ibcirc"><svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg></div>
              <span class="iblbl">Nearby</span>
            </div>
          </div>
          <div class="seclbl">Luminaires</div>
          <div class="lumgrid" id="lumgrid"></div>
        </div>
      </div>

      <!-- SCENES (in phone) -->
      <div class="pane" id="pane-scenes">
        <div class="scenespad">
          <div class="nbadge" style="margin-bottom:12px"><span class="nbname">ETS Office</span><span class="nbstat">Scenes</span></div>
          <div class="scgrid" id="scgrid"></div>
        </div>
      </div>

      <!-- MORE -->
      <div class="pane" id="pane-more">
        <div class="morelist">
          <div class="mitem"><div class="mleft"><div class="micn"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg></div><span class="mlbl">Scenes</span></div><span class="mchev">›</span></div>
          <div class="mitem"><div class="mleft"><div class="micn"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg></div><span class="mlbl">Timers</span></div><span class="mchev">›</span></div>
          <div class="mitem"><div class="mleft"><div class="micn"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div><span class="mlbl">Sensors</span></div><span class="mchev">›</span></div>
          <div class="mitem"><div class="mleft"><div class="micn"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></div><span class="mlbl">Settings</span></div><span class="mchev">›</span></div>
        </div>
      </div>

      <!-- TABS -->

var sceneActive=-1;var cpZone=null;var ft=null;

function sZ(id,on,dim){var z=ZONES.find(function(z){return z.id===id;});if(z){z.on=on;z.dim=dim;}}
function h2r(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}

function buildLayers(){
  var g=document.getElementById('zlayers');g.innerHTML='';
  var defs=document.querySelector('#osvg defs');
  while(defs.children.length>1)defs.removeChild(defs.lastChild);
  ZONES.forEach(function(z){
    ['f',''].forEach(function(prefix){
      var pts=prefix?z.fpts:z.pts;
      var cid=prefix+'c-'+z.id;
      var c=document.createElementNS('http://www.w3.org/2000/svg','clipPath');
      c.setAttribute('id',cid);
      var p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      p.setAttribute('points',pts);c.appendChild(p);defs.appendChild(c);
      var u=document.createElementNS('http://www.w3.org/2000/svg','use');
      u.setAttribute('href','#onsrc');
      u.setAttribute('clip-path','url(#'+cid+')');
      u.style.opacity='0';u.style.transition='opacity .7s ease';
      u.id=prefix+'l-'+z.id;g.appendChild(u);
    });
  });
}

function refresh(){
  var on=0;
  ZONES.forEach(function(z){
    var op=z.on?z.dim/100:0;
    var el=document.getElementById('l-'+z.id);
    var fel=document.getElementById('fl-'+z.id);
    if(el)el.style.opacity=op;
    if(fel)fel.style.opacity=z.on?op*z.fa:0;
    if(z.on)on++;
  });
  var ns=document.getElementById('nbstat');
  if(ns)ns.textContent=on+' of '+ZONES.length+' on';
  var ab=document.getElementById('allbtn');
  if(ab)ab.className='ibcirc'+(on>0?' active':'');
  renderLumGrid();
  renderPills();
}

function fade(fn,ms){
  var s=ZONES.map(function(z){return{on:z.on,dim:z.on?z.dim:0};});
  fn();
  var e=ZONES.map(function(z){return{on:z.on,dim:z.on?z.dim:0};});
  ZONES.forEach(function(z,i){z.on=s[i].on||e[i].on;z.dim=s[i].dim;});
  var steps=Math.ceil(ms/30);var step=0;
  if(ft)clearInterval(ft);
  ft=setInterval(function(){
    step++;var t=step/steps;var ease=t<.5?2*t*t:(4-2*t)*t-1;
    ZONES.forEach(function(z,i){z.dim=Math.round(s[i].dim+(e[i].dim-s[i].dim)*ease);});
    if(step>=steps){ZONES.forEach(function(z,i){z.dim=e[i].dim;z.on=e[i].on;});clearInterval(ft);}
    refresh();
  },30);
}

function renderLumGrid(){
  var g=document.getElementById('lumgrid');if(!g)return;g.innerHTML='';
  ZONES.forEach(function(z){
    var t=document.createElement('div');t.className='ltile';
    t.innerHTML='<div class="lcirc'+(z.on?' on':'')+'"><svg viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg></div>'
      +'<div class="larc"><div class="larcf" style="width:'+(z.on?z.dim:0)+'%;background:'+(z.on?z.color:'#555')+'"></div></div>'
      +'<div class="lname'+(z.on?' on':'')+'">'+z.name+'</div>';
    (function(zr){
      t.onclick=function(){fade(function(){zr.on=!zr.on;zr.dim=zr.on?(zr.dim||85):0;},350);sceneActive=-1;setTimeout(function(){renderScenes();updateSceneLabel();},60);};
      t.ondblclick=function(e){e.stopPropagation();openCP(zr.id);};
    })(z);
    g.appendChild(t);
  });
}

function renderScenes(){
  var g=document.getElementById('scgrid');if(!g)return;g.innerHTML='';
  SCENES.forEach(function(s,i){
    var light=(s.bg==='#d0d0d0');
    var t=document.createElement('div');t.className='stile';
    t.innerHTML='<div class="scirc'+(sceneActive===i?' on':'')+'" style="background:'+s.bg+';--sc:'+s.bg+'"><svg viewBox="0 0 24 24" style="fill:'+(light?'#444':'#fff')+'"><path d="'+s.icon+'"/></svg></div>'
      +'<span class="scname">'+s.name+'</span>';
    (function(idx){t.onclick=function(){actScene(idx);};})(i);
    g.appendChild(t);
  });
}

function renderPills(){
  var bar=document.getElementById('zonepills');if(!bar)return;bar.innerHTML='';
  ZONES.forEach(function(z){
    var pill=document.createElement('div');pill.className='zone-pill';
    pill.innerHTML='<div class="zone-dot'+(z.on?'':' off')+'" style="background:'+z.color+'"></div>'
      +'<span>'+(z.on?z.name+' '+z.dim+'%':z.name)+'</span>';
    bar.appendChild(pill);
  });
}

function updateSceneLabel(){
  var el=document.getElementById('scene-label');
  if(!el)return;
  el.textContent=sceneActive>=0?SCENES[sceneActive].name:'Custom';
}

function actScene(i){
  sceneActive=i;
  fade(SCENES[i].apply,700);
  toast2(SCENES[i].name);
  setTimeout(function(){renderScenes();updateSceneLabel();},60);
}

function toggleAll(){
  var anyOn=ZONES.some(function(z){return z.on;});
  fade(function(){ZONES.forEach(function(z){z.on=!anyOn;z.dim=!anyOn?80:0;});},500);
  sceneActive=-1;
  setTimeout(function(){renderScenes();updateSceneLabel();},60);
}

function setVP(idx,btn){
  document.querySelectorAll('.vpbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  toast2('View '+(idx+1));
}

function openCP(id){

function closeCP(){document.getElementById('cpanel').classList.remove('open');cpZone=null;}
function updateCPprev(){

function cpDim(v){if(!cpZone)return;var z=ZONES.find(function(z){return z.id===cpZone;});z.dim=+v;z.on=+v>0;document.getElementById('vdim').textContent=(+v).toFixed(1)+'%';updateCPprev();refresh();}
function cpCCT(v){document.getElementById('vcct').textContent=Math.round(2700+(+v/100)*3800)+' K';}

// ─────────────────────────────────────────────────────────────
// Casambi Cloud API integration
// ─────────────────────────────────────────────────────────────
//
// On load we try to authenticate against the real Casambi API.
// If it succeeds, ZONES and SCENES are rebuilt from the network
// topology and every UI action is mirrored to a WebSocket
// controlUnit / controlScene message. Incoming unitChanged
// events are folded back into ZONES → refresh().
//
// If any step fails, we fall back to demo mode (hardcoded
// ZONES / SCENES above) so the pitch demo never breaks.

var casambi = null;             // CasambiClient instance
var apiConnected = false;
var unitByZone = {};            // zoneId → { unitId, ... }
var sceneByIndex = {};          // SCENES index → { sceneId }

function setBanner(state, text){
  var b = document.getElementById('status-banner');
  var t = document.getElementById('status-text');
  if(!b) return;
  b.className = 'status-banner ' + state + ' show';
  if(t) t.textContent = text;
  if(state === 'connected'){
    setTimeout(function(){ b.classList.remove('show'); }, 1800);
  }
}

// Build a zone entry from a Casambi unit. We use unit id as key,
// name as label. Colour is a default — can be overridden by mapping.
function zoneFromUnit(unit){
  var id = String(unit.id);
  return {
    id: id,
    unitId: unit.id,
    name: unit.name || ('Unit ' + unit.id),
    color: '#ffd54f',
    on: !!unit.on,
    dim: Math.round((unit.dimLevel || 0) * 100),
    cct: 30,
    // No SVG polygon for API-driven units — the compositor’s
    // per-zone visual layers still come from the render pack
    // and its mapping lookup. For unmapped units we just track
    // state without a visual.
    pts:'', fpts:'', fa:0
  };
}

function sceneFromApi(scn, idx){
  var palette = ['#3a3a3c','#1d6fd8','#E86524','#6d28d9','#d0d0d0','#7c3aed','#2c8a4f','#c22e5c'];
  return {
    sceneId: scn.id,
    name: scn.name || ('Scene ' + scn.id),
    bg: palette[idx % palette.length],
    icon: 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z',
    apply: function(){
      // Local optimistic update — set every zone dim to zero
      // for scenes we don't have granular data for. Real state
      // comes back via unitChanged.
    }
  };
}

// Merge API unit list into our ZONES array. Preserves any zone
// entries that already exist by matching on unit id.
function applyUnits(units){
  if(!units) return;
  // units may be an object keyed by id or an array
  var list = Array.isArray(units) ? units : Object.values(units);
  var next = [];
  list.forEach(function(u){
    var existing = ZONES.find(function(z){ return z.unitId === u.id; });
    if(existing){
      existing.name = u.name || existing.name;
      existing.on = !!u.on;
      existing.dim = Math.round((u.dimLevel || 0) * 100);
      next.push(existing);
    }else{
      next.push(zoneFromUnit(u));
    }
    unitByZone[String(u.id)] = { unitId: u.id };
  });
  if(next.length){
    ZONES.length = 0;
    next.forEach(function(z){ ZONES.push(z); });
  }
}

function applyScenes(scenes){
  if(!scenes) return;
  var list = Array.isArray(scenes) ? scenes : Object.values(scenes);
  if(!list.length) return;
  SCENES.length = 0;
  list.forEach(function(s, i){
    var scn = sceneFromApi(s, i);
    SCENES.push(scn);
    sceneByIndex[i] = { sceneId: s.id };
  });
}

// Fold a WebSocket unitChanged event into ZONES + trigger re-render.
function onUnitChanged(msg){
  if(!msg || typeof msg.id === 'undefined') return;
  var z = ZONES.find(function(z){ return z.unitId === msg.id; });
  if(!z){
    // Unknown unit — add it lazily
    z = zoneFromUnit({ id: msg.id, name: msg.name, on: msg.online, dimLevel: msg.dimLevel });
    ZONES.push(z);
  }
  if(typeof msg.dimLevel === 'number'){
    z.dim = Math.round(msg.dimLevel * 100);
    z.on = z.dim > 0;
  }
  if(typeof msg.online === 'boolean'){
    // Don’t force off when offline — just note it
  }
  // Extract CCT if present in controls
  if(Array.isArray(msg.controls)){
    msg.controls.forEach(function(c){
      if(c && c.type === 'CCT' && typeof c.level === 'number'){
        z.cct = Math.round(c.level * 100);
      }
    });
  }
  refresh();
}

// ─── Outgoing control wiring ─────────────────────────────────
// We wrap the existing state-mutating functions so they also
// send WebSocket frames when connected. If not connected, the
// demo behaviour is preserved.

var _cpDim = cpDim;
cpDim = function(v){
  _cpDim(v);
  if(apiConnected && cpZone){
    var z = ZONES.find(function(z){ return z.id === cpZone; });
    if(z && z.unitId != null){
      casambi.setUnitDimmer(z.unitId, (+v) / 100);
    }
  }
};

var _cpCCT = cpCCT;
cpCCT = function(v){
  _cpCCT(v);
  if(apiConnected && cpZone){
    var z = ZONES.find(function(z){ return z.id === cpZone; });
    if(z && z.unitId != null){
      var kelvin = Math.round(2700 + ((+v) / 100) * 3800);
      casambi.setUnitCCT(z.unitId, kelvin);
    }
  }
};

var _actScene = actScene;
actScene = function(i){
  _actScene(i);
  if(apiConnected){
    var entry = sceneByIndex[i];
    if(entry && entry.sceneId != null){
      casambi.controlScene(entry.sceneId, 1);
    }
  }
};

var _toggleAll = toggleAll;
toggleAll = function(){
  var anyOn = ZONES.some(function(z){ return z.on; });
  _toggleAll();
  if(apiConnected){
    // Mirror per-unit
    ZONES.forEach(function(z){
      if(z.unitId != null){
        casambi.setUnitDimmer(z.unitId, anyOn ? 0 : 0.8);
      }
    });
  }
};

// After renderLumGrid runs, we hook up per-tile clicks to also
// send WebSocket frames. Rather than rewrite renderLumGrid, we
// re-attach after each render via a MutationObserver on the grid.
var _renderLumGrid = renderLumGrid;
renderLumGrid = function(){
  _renderLumGrid();
  if(!apiConnected) return;
  var grid = document.getElementById('lumgrid');
  if(!grid) return;
  Array.prototype.forEach.call(grid.children, function(tile, idx){
    var z = ZONES[idx];
    if(!z || z.unitId == null) return;
    var origClick = tile.onclick;
    tile.onclick = function(e){
      if(origClick) origClick.call(tile, e);
      // After the local toggle, tile’s zone.on/dim are already updated.
      var latest = ZONES.find(function(zz){ return zz.unitId === z.unitId; });
      if(latest){
        casambi.setUnitDimmer(z.unitId, latest.on ? (latest.dim || 80) / 100 : 0);
      }
    };
  });
};

// ─── Bootstrap ───────────────────────────────────────────────
async function bootstrap(){
  buildLayers(); renderLumGrid(); renderScenes(); renderPills(); refresh();

  setBanner('connecting', 'Authenticating with Casambi…');
  casambi = new CasambiClient({ wireId: 1, autoReconnect: true });

  casambi.on('status', function(s){
    if(s.status === 'error'){ setBanner('error', 'Connection error'); }
    if(s.status === 'connecting'){ setBanner('connecting', 'Connecting…'); }
  });
  casambi.on('unitChanged', onUnitChanged);
  casambi.on('networkUpdated', function(){
    // Refresh topology when the network changes
    casambi.loadNetwork().then(function(net){
      if(net.units) applyUnits(net.units);
      if(net.scenes) applyScenes(net.scenes);
      buildLayers(); renderLumGrid(); renderScenes(); refresh();
    }).catch(function(e){ console.warn('reload failed', e); });
  });

  try {
    await casambi.login();
    var net = await casambi.loadNetwork();
    if(net.units) applyUnits(net.units);
    if(net.scenes) applyScenes(net.scenes);
    buildLayers(); renderLumGrid(); renderScenes(); renderPills(); refresh();

    casambi.on('ready', function(){
      apiConnected = true;
      setBanner('connected', (casambi.session && casambi.session.name) ? ('Connected · ' + casambi.session.name) : 'Connected');
    });
    casambi.connectWebSocket();

    // Also update the network name label if we got one
    var nbName = document.querySelector('.nbname');
    if(nbName && casambi.session && casambi.session.name){
      nbName.textContent = casambi.session.name;
    }
    var htitle = document.querySelector('.htitle');
    if(htitle && casambi.session && casambi.session.name){
      htitle.textContent = casambi.session.name;
    }
  } catch(err){
    console.warn('[casambi] falling back to demo mode:', err);
    apiConnected = false;
    setBanner('demo', 'Demo mode — API not available');
    // Keep hardcoded ZONES / SCENES that were rendered above
  }
}

bootstrap();

</script>
